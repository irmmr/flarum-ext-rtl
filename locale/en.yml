irmmr-rtl:
    admin:
        settings:
            lang_base_label: Language-based RTL
            lang_base_text: When enabled, RTL is applied only if the active interface language supports RTL. When disabled, forum/admin RTL settings are applied unconditionally.

            fm_status_label: Forum RTL
            fm_status_text: Enables RTL layout for the forum frontend. If Language-based RTL is enabled, this applies only when the selected language is RTL.

            ad_status_label: Admin RTL
            ad_status_text: Enables RTL layout for the admin panel. If Language-based RTL is enabled, this applies only when the selected language is RTL.